# Jekyll configuration for GitHub Pages
# Claude-generated docs (plans, specs) live under claude/ and contain
# JSX/TS code with {{ }} syntax that conflicts with Liquid templates.
# render_with_liquid: false suppresses this for the claude/ subtree.
# error_mode: warn prevents other Liquid issues from failing the build.

liquid:
  error_mode: warn

defaults:
  - scope:
      path: "claude"
    values:
      render_with_liquid: false
